global-client-fingerprint: chrome

port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894

allow-lan: true
tcp-concurrent: true
enable-process: true
find-process-mode: strict
ipv6: true
log-level: debug
geo-auto-update: true
geo-update-interval: 168
secret: ""
bind-address: "*"
unified-delay: false
disable-keep-alive: false
keep-alive-idle: 30
keep-alive-interval: 30

profile:
  name: My Custom Clash Profile
  version: 1
  author: test
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  ipv6: true
  respect-rules: false
  prefer-h3: true
  cache-algorithm: arc
  use-system-hosts: true
  use-host: true
  enhanced-mode: fake-ip
  fake-ip-filter-mode: blacklist
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.invalid"
    - "*.localhost"
    - "*.test"
    - "*.local"
    - "*.home.arpa"
    - time.*.com
    - ntp.*.com
    - "*.ir"

  default-nameserver:
    - 8.8.8.8
    - 8.8.4.4
  nameserver:
    - 1.1.1.1
    - 1.0.0.1
  direct-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  proxy-server-nameserver:
    - 1.1.1.1
    - 8.8.8.8    
    - https://cloudflare-dns.com/dns-query
    - tls://one.one.one.one
    - one.one.one.one
    - https://doh.pub/dns-query
    - tls://doh.pub
    - doh.pub
    - 2606:4700:4700::1111
    - 2606:4700:4700::1001
    - 2001:4860:4860::8888
    - 2001:4860:4860::8844

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080, 8880, 2052, 2082, 2086, 2095]
    TLS:
      ports: [443, 8443, 2053, 2083, 2087, 2096]

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  auto-redir: true
  dns-hijack:
    - any:53
    - tcp://any:53

